<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Emerald Gradients -->
    <linearGradient id="emerald1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="emerald2" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#064e3b"/>
    </linearGradient>

    <!-- Sky Blue Gradients -->
    <linearGradient id="sky1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    <linearGradient id="sky2" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#075985"/>
    </linearGradient>

    <!-- Professional Soft Drop Shadow for 3D Layering Effect -->
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#020617" flood-opacity="0.15"/>
    </filter>

    <!-- Mathematically perfect continuous tangent droplet -->
    <path id="drop" d="M 0 20 A 30 30 0 0 0 60 20 Q 60 -20 30 -70 Q 0 -20 0 20 Z" />
  </defs>

  <g transform="translate(128, 128)">
    <!-- Sky Blue Diagonal (Receiver path) -->
    <use href="#drop" fill="url(#sky1)" transform="rotate(-45) translate(-30, -32)" filter="url(#shadow)" />
    <use href="#drop" fill="url(#sky2)" transform="rotate(135) translate(-30, -32)" filter="url(#shadow)" />

    <!-- Emerald Diagonal (Donor path) -->
    <use href="#drop" fill="url(#emerald1)" transform="rotate(45) translate(-30, -32)" filter="url(#shadow)" />
    <use href="#drop" fill="url(#emerald2)" transform="rotate(225) translate(-30, -32)" filter="url(#shadow)" />
    
    <!-- Geometric Core Diamond (Community Unity) -->
    <rect x="-16" y="-16" width="32" height="32" rx="8" fill="#ffffff" transform="rotate(45)" filter="url(#shadow)" />
    <circle cx="0" cy="0" r="5" fill="#059669" />
  </g>
</svg>
